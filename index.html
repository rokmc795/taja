<script>
"use strict";
/* ── 한글 엔진 (두벌식 오토마타) ─────────────────────────── */
const CHO = [..."ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ"];
const JUNG = [..."ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ"];
const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CV = {"ㅘ":"ㅗㅏ","ㅙ":"ㅗㅐ","ㅚ":"ㅗㅣ","ㅝ":"ㅜㅓ","ㅞ":"ㅜㅔ","ㅟ":"ㅜㅣ","ㅢ":"ㅡㅣ"};
const CF = {"ㄳ":"ㄱㅅ","ㄵ":"ㄴㅈ","ㄶ":"ㄴㅎ","ㄺ":"ㄹㄱ","ㄻ":"ㄹㅁ","ㄼ":"ㄹㅂ","ㄽ":"ㄹㅅ","ㄾ":"ㄹㅌ","ㄿ":"ㄹㅍ","ㅀ":"ㄹㅎ","ㅄ":"ㅂㅅ"};
const VC = {"ㅗㅏ":"ㅘ","ㅗㅐ":"ㅙ","ㅗㅣ":"ㅚ","ㅜㅓ":"ㅝ","ㅜㅔ":"ㅞ","ㅜㅣ":"ㅟ","ㅡㅣ":"ㅢ"};
const JC = {"ㄱㅅ":"ㄳ","ㄴㅈ":"ㄵ","ㄴㅎ":"ㄶ","ㄹㄱ":"ㄺ","ㄹㅁ":"ㄻ","ㄹㅂ":"ㄼ","ㄹㅅ":"ㄽ","ㄹㅌ":"ㄾ","ㄹㅍ":"ㄿ","ㄹㅎ":"ㅀ","ㅂㅅ":"ㅄ"};
const isSyll = ch => { const v = ch.codePointAt(0); return v >= 0xAC00 && v <= 0xD7A3; };
const choI = ch => { const i = CHO.indexOf(ch); return i < 0 ? null : i; };
const jungI = ch => { const i = JUNG.indexOf(ch); return i < 0 ? null : i; };
const jongI = ch => { const i = JONG.indexOf(ch); return i < 1 ? null : i; };
const isVowel = ch => JUNG.includes(ch);
const isCons = ch => CHO.includes(ch) || jongI(ch) !== null;

const splitSyll = ch => { if (!isSyll(ch)) return null; const i = ch.codePointAt(0) - 0xAC00; return [Math.floor(i / 588), Math.floor((i % 588) / 28), i % 28]; };

function hAppend(text, jamo) {
  if (!isVowel(jamo) && !isCons(jamo)) return text + jamo;

/* ── 사운드 (Web Audio 합성, 외부 파일 불필요) ───────────── */
const Sound = {
  on: localStorage.getItem("cw_sound") !== "0",
  ctx: null,
  toggle() { this.on = !this.on; localStorage.setItem("cw_sound", this.on ? "1" : "0"); },
  ensure() {
    if (!this.on) return null;
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      this.ctx = new AC();
    }
    if (this.ctx.state === "suspended") this.ctx.resume();
    return this.ctx;
  },
  tone(freq, dur = 0.12, type = "sine", vol = 0.12, delay = 0, slide = 0) {
    const ctx = this.ensure();
    if (!ctx) return;
    const t0 = ctx.currentTime + delay;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(slide, 1), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  key() { this.tone(1400, 0.035, "triangle", 0.05); },                     // 타건
  correct() { this.tone(660, 0.09, "sine", 0.12); this.tone(990, 0.14, "sine", 0.12, 0.07); },  // 정답
  wrong() { this.tone(150, 0.18, "sawtooth", 0.09); },                     // 오답
  pop() { this.tone(500, 0.1, "triangle", 0.14, 0, 1000); },               // 베네치아 처리
  splash() { this.tone(420, 0.32, "sine", 0.13, 0, 85); },                 // 물에 빠짐
  levelUp() { [523, 659, 784, 1047].forEach((f, i) => this.tone(f, 0.12, "triangle", 0.11, i * 0.09)); },
  fanfare() {
    [523, 659, 784, 1047, 1319].forEach((f, i) => this.tone(f, 0.16, "triangle", 0.12, i * 0.11));
    this.tone(1568, 0.45, "triangle", 0.1, 0.55);
  },
  done() { this.tone(784, 0.12, "sine", 0.12); this.tone(1047, 0.24, "sine", 0.12, 0.1); },
  over() { [400, 320, 250, 175].forEach((f, i) => this.tone(f, 0.17, "sawtooth", 0.08, i * 0.13)); }
};

/* ── 기록 (localStorage, 사용자별) ───────────────────────── */
const Records = {
  load() { try { return JSON.parse(localStorage.getItem("cw_records") || "[]"); } catch { return []; } },
  save(list) { localStorage.setItem("cw_records", JSON.stringify(list.slice(-500))); },
  add(mode, cpm, acc) {
    const all = this.load();
    const best = this.best(mode);
    all.push({ m: mode, c: cpm, a: acc, d: Date.now(), u: Users.current()?.id });
    this.save(all);
    return cpm > best && cpm > 0;
  },
  mine() { const uid = Users.current()?.id; return this.load().filter(r => r.u === uid); },
  of(mode) { return this.mine().filter(r => r.m === mode); },
  best(mode) { return Math.max(0, ...this.of(mode).map(r => r.c)); },
  bestOverall() { return Math.max(0, ...this.mine().filter(r => r.m !== "venice").map(r => r.c)); }
};

const Users = {
  load() { try { return JSON.parse(localStorage.getItem("cw_users") || "[]"); } catch { return []; } },
  save(list) { localStorage.setItem("cw_users", JSON.stringify(list)); },
  currentId() { return localStorage.getItem("cw_user") || ""; },
  current() { const l = this.load(); return l.find(u => u.id === this.currentId()) || l[0] || null; },
  select(id) { localStorage.setItem("cw_user", id); },
  add(name, emoji) {
    const u = { id: "u" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name, emoji };
    const l = this.load(); l.push(u); this.save(l); this.select(u.id);
    return u;
  },
  remove(id) {
    this.save(this.load().filter(u => u.id !== id));
    Records.save(Records.load().filter(r => r.u !== id));
    this.ensure();
  },
  ensure() {
    let l = this.load();
    if (!l.length) { this.add("플레이어 1", "🙂"); l = this.load(); }
    if (!l.find(u => u.id === this.currentId())) this.select(l[0].id);
    // 이전 버전 기록(사용자 정보 없음)은 첫 사용자에게 귀속
    const recs = Records.load();
    if (recs.some(r => !r.u)) {
      const first = l[0].id;
      Records.save(recs.map(r => r.u ? r : { ...r, u: first }));

};

const KROWS = [[..."ㅂㅈㄷㄱㅅㅛㅕㅑㅐㅔ"], [..."ㅁㄴㅇㄹㅎㅗㅓㅏㅣ"], [..."ㅋㅌㅊㅍㅠㅜㅡ"]];
const SHIFT_MAP = {"ㅂ":"ㅃ","ㅈ":"ㅉ","ㄷ":"ㄸ","ㄱ":"ㄲ","ㅅ":"ㅆ","ㅐ":"ㅒ","ㅔ":"ㅖ"};
const SHIFT_BASE = {"ㅃ":"ㅂ","ㅉ":"ㅈ","ㄸ":"ㄷ","ㄲ":"ㄱ","ㅆ":"ㅅ","ㅒ":"ㅐ","ㅖ":"ㅔ"};
let kbdShift = false;
function keyboardHTML(withReturn) {

  return `<div class="kbd" id="kbd">${rows}${bottom}</div>`;
}
function bindKeyboard() {
  const kbd = document.getElementById("kbd");
  if (!kbd) return;
  kbd.addEventListener("click", e => {
    const b = e.target.closest("button");
    if (!b || !session) return;
    if (b.dataset.jamo) {
      let j = b.dataset.jamo;
      if (kbdShift) { j = SHIFT_MAP[j] || j; kbdShift = false; refreshKbdShift(); }
      Sound.key();
      session.jamo(j);
    } else if (b.dataset.act === "shift") { kbdShift = !kbdShift; refreshKbdShift(); }
    else if (b.dataset.act === "bs") { Sound.key(); session.backspace(); }
    else if (b.dataset.act === "space") { Sound.key(); session.space(); }
    else if (b.dataset.act === "enter") session.submit();
  });
}
function refreshKbdShift() {
  document.querySelectorAll("#kbd [data-jamo]").forEach(b => {
    const base = Object.entries(SHIFT_MAP).find(([, s]) => s === b.textContent)?.[0] || b.textContent;
    b.textContent = kbdShift ? (SHIFT_MAP[base] || base) : base;
    b.dataset.jamo = b.textContent;
  });
}
function highlightKey(jamo) {
  document.querySelectorAll("#kbd [data-jamo]").forEach(b => b.classList.remove("hl"));
  if (!jamo || jamo === " ") return;
  const base = SHIFT_BASE[jamo] || jamo;
  document.querySelectorAll("#kbd [data-jamo]").forEach(b => {
    if (b.dataset.jamo === base || (SHIFT_BASE[b.dataset.jamo] || b.dataset.jamo) === base) b.classList.add("hl");
  });
}
/* 외장 키보드: 물리 키 위치(e.code) → 두벌식. 키보드 언어 설정과 무관하게 동작 */
const CODE_JAMO = { KeyQ:["ㅂ","ㅃ"],KeyW:["ㅈ","ㅉ"],KeyE:["ㄷ","ㄸ"],KeyR:["ㄱ","ㄲ"],KeyT:["ㅅ","ㅆ"],KeyY:["ㅛ","ㅛ"],KeyU:["ㅕ","ㅕ"],KeyI:["ㅑ","ㅑ"],KeyO:["ㅐ","ㅒ"],KeyP:["ㅔ","ㅖ"],KeyA:["ㅁ","ㅁ"],KeyS:["ㄴ","ㄴ"],KeyD:["ㅇ","ㅇ"],KeyF:["ㄹ","ㄹ"],KeyG:["ㅎ","ㅎ"],KeyH:["ㅗ","ㅗ"],KeyJ:["ㅓ","ㅓ"],KeyK:["ㅏ","ㅏ"],KeyL:["ㅣ","ㅣ"],KeyZ:["ㅋ","ㅋ"],KeyX:["ㅌ","ㅌ"],KeyC:["ㅊ","ㅊ"],KeyV:["ㅍ","ㅍ"],KeyB:["ㅠ","ㅠ"],KeyN:["ㅜ","ㅜ"],KeyM:["ㅡ","ㅡ"] };
document.addEventListener("keydown", e => {
  if (!session || e.metaKey || e.ctrlKey || e.altKey) return;
  if (CODE_JAMO[e.code]) { e.preventDefault(); Sound.key(); session.jamo(CODE_JAMO[e.code][e.shiftKey ? 1 : 0]); }
  else if (e.code === "Space") { e.preventDefault(); Sound.key(); session.space(); }
  else if (e.code === "Backspace") { e.preventDefault(); Sound.key(); session.backspace(); }
  else if (e.code === "Enter" || e.code === "NumpadEnter") { e.preventDefault(); session.submit(); }
});

    ${keyboardHTML(false)}`;
  bindBack(); bindKeyboard();
  app.querySelectorAll("[data-lv]").forEach(b => b.addEventListener("click", () => go(() => renderKey(b.dataset.lv))));
  const cells = [...document.querySelectorAll("#grid span")];
  const update = () => {
    const typed = decompose(input);
    let i = 0;
    while (i < typed.length && i < seq.length && typed[i] === seq[i]) i++;
    matched = i;
    const wrongNow = Math.max(typed.length - i, 0);
    if (wrongNow > pendingWrong) { errors += wrongNow - pendingWrong; Sound.wrong(); }
    pendingWrong = wrongNow;
    cells.forEach((c, idx) => { c.className = idx < matched ? "done" : idx === matched ? "cur" : ""; });
    document.getElementById("wrongBanner").style.display = pendingWrong > 0 ? "" : "none";
    document.getElementById("pbar").style.width = (matched / seq.length * 100) + "%";
    document.getElementById("cPrg").textContent = `${matched}/${seq.length}`;
    const acc = matched + errors ? Math.round(matched / (matched + errors) * 100) : 100;
    document.getElementById("cAcc").textContent = acc + "%";
    highlightKey(matched < seq.length ? seq[matched] : null);
    setInput(input);
    if (matched === seq.length && !done) {
      done = true;
      const el = (Date.now() - start) / 1000;
      showResult("key", `자리 연습 · ${levelName}`, el > 1 ? Math.round(matched / el * 60) : 0, acc, () => go(() => renderKey(levelName)));
    }
  };
  const feed = fn => { if (done) return; if (!start) start = Date.now(); fn(); update(); };
  session = {
    jamo: j => feed(() => input = hAppend(input, j)),
    space: () => feed(() => input += " "),
    backspace: () => feed(() => input = hDelete(input)),
    submit: () => {}
  };
  const t = setInterval(() => {
    if (!start || done) return;
    const el = (Date.now() - start) / 1000;
    document.getElementById("cTime").textContent = fmtTime(el);
    document.getElementById("cCpm").textContent = el > 1 ? Math.round(matched / el * 60) : 0;
  }, 250);
  cleanup = () => clearInterval(t);
  update();
}

/* ── 낱말 연습 ───────────────────────────────────────────── */
function renderWord() {
  const words = shuffle(WORDS).slice(0, 15);
  let idx = 0, input = "", correct = 0, wrong = 0, strokes = 0, start = null, done = false;
  app.innerHTML = `
    ${backbar("낱말 연습")}
    ${chipsHTML([["현재 타수", 0, "cCpm"], ["정확도", "100%", "cAcc"], ["진행", `1/${words.length}`, "cPrg"], ["시간", "0:00", "cTime"]])}
    <div class="progress"><div id="pbar" style="width:0;background:${grad(MODES.word.g)}"></div></div>
    <div class="card" id="wordCard" style="padding:34px 18px;text-align:center">
      <div class="bigword" id="bigWord"></div>
      <div class="nextline" id="nextWord" style="text-align:center"></div>
    </div>
    ${inputLineHTML("낱말을 입력하고 return")}
    ${keyboardHTML(true)}`;
  bindBack(); bindKeyboard();
  const showWord = () => {
    document.getElementById("bigWord").textContent = words[idx];
    document.getElementById("nextWord").innerHTML = idx + 1 < words.length ? `<b>다음</b>${esc(words[idx + 1])}` : "";
    document.getElementById("cPrg").textContent = `${idx + 1}/${words.length}`;
    document.getElementById("pbar").style.width = (idx / words.length * 100) + "%";
    highlightNext();
  };
  const highlightNext = () => {
    const t = decompose(words[idx]), u = decompose(input);
    let k = 0;
    while (k < u.length && k < t.length && u[k] === t[k]) k++;
    highlightKey(u.length === k && k < t.length ? t[k] : null);
  };
  const acc = () => (correct + wrong) ? Math.round(correct / (correct + wrong) * 100) : 100;
  const cpm = () => { const el = start ? (Date.now() - start) / 1000 : 0; return el > 1 ? Math.round(strokes / el * 60) : 0; };
  const feed = fn => { if (done) return; if (!start) start = Date.now(); fn(); setInput(input); highlightNext(); };
  session = {
    jamo: j => feed(() => input = hAppend(input, j)),
    space: () => feed(() => input += " "),
    backspace: () => feed(() => input = hDelete(input)),
    submit: () => {
      if (done || !input.trim()) return;
      const card = document.getElementById("wordCard");
      if (input.trim() === words[idx]) { correct++; strokes += keystrokes(words[idx]) + 1; flash(card, "var(--ok)"); Sound.correct(); }
      else { wrong++; flash(card, "var(--bad)"); Sound.wrong(); }
      input = ""; setInput("");
      document.getElementById("cAcc").textContent = acc() + "%";
      if (idx + 1 >= words.length) {
        done = true;
        showResult("word", "낱말 연습", cpm(), acc(), () => go(renderWord));
      } else { idx++; showWord(); }
    }
  };
  const flash = (el, color) => { el.style.boxShadow = `0 0 0 3px ${color}`; setTimeout(() => el.style.boxShadow = "", 500); };
  const t = setInterval(() => {
    if (!start || done) return;
    document.getElementById("cTime").textContent = fmtTime((Date.now() - start) / 1000);
    document.getElementById("cCpm").textContent = cpm();
  }, 250);
  cleanup = () => clearInterval(t);
  showWord();
}

/* ── 문장 따라치기 (짧은 글 / 긴 글) ─────────────────────── */
function renderLines(mode, title, makeLines) {
  const lines = makeLines();
  const g = MODES[mode].g;
  let idx = 0, input = "", doneStrokes = 0, doneCorrect = 0, doneTotal = 0, start = null, done = false;
  app.innerHTML = `
    ${backbar(title)}
    ${chipsHTML([["현재 타수", 0, "cCpm"], ["정확도", "100%", "cAcc"], ["진행", `1/${lines.length}`, "cPrg"], ["시간", "0:00", "cTime"]])}
    <div class="progress"><div id="pbar" style="width:0;background:${grad(g)}"></div></div>
    <div class="card">
      <div style="color:var(--sub);font-size:13px;margin-bottom:8px">따라 입력하세요</div>
      <div class="target" id="target"></div>
      <div class="nextline" id="nextLine"></div>
    </div>
    ${inputLineHTML("문장을 입력하고 return")}
    ${keyboardHTML(true)}`;
  bindBack(); bindKeyboard();
  const correctStrokes = () => {
    const t = [...lines[idx]], u = [...input];
    let sum = 0;
    for (let i = 0; i < Math.min(t.length, u.length); i++) if (t[i] === u[i]) sum += keystrokes(u[i]);
    return sum;
  };
  const cpm = () => {
    const el = start ? (Date.now() - start) / 1000 : 0;
    return el > 1 ? Math.round((doneStrokes + correctStrokes()) / el * 60) : 0;
  };
  const acc = () => doneTotal ? Math.round(doneCorrect / doneTotal * 100) : 100;
  const paint = () => {
    const t = [...lines[idx]], u = [...input];
    document.getElementById("target").innerHTML = t.map((ch, i) => {
      let cls = "rest";
      if (i < u.length) {
        if (u[i] === ch) cls = "ok";
        else if (i === u.length - 1 && isComposingPrefix(u[i], ch)) cls = "ing";
        else cls = "bad";
      }
      return `<span class="${cls}">${esc(ch)}</span>`;
    }).join("");
    document.getElementById("nextLine").innerHTML = idx + 1 < lines.length ? `<b>다음</b>${esc(lines[idx + 1])}` : "";
    const tj = decompose(lines[idx]), uj = decompose(input);
    let k = 0;
    while (k < uj.length && k < tj.length && uj[k] === tj[k]) k++;
    highlightKey(uj.length === k && k < tj.length ? tj[k] : null);
    setInput(input);
  };
  const feed = fn => { if (done) return; if (!start) start = Date.now(); fn(); paint(); };
  session = {
    jamo: j => feed(() => input = hAppend(input, j)),
    space: () => feed(() => input += " "),
    backspace: () => feed(() => input = hDelete(input)),
    submit: () => {
      if (done || !input.trim()) return;
      const t = [...lines[idx]], u = [...input];
      let c = 0;
      for (let i = 0; i < Math.min(t.length, u.length); i++) if (t[i] === u[i]) c++;
      doneCorrect += c; doneTotal += t.length; doneStrokes += correctStrokes() + 1;
      if (c === t.length) Sound.correct(); else Sound.wrong();
      input = "";
      document.getElementById("cAcc").textContent = acc() + "%";
      if (idx + 1 >= lines.length) {
        done = true;
        showResult(mode, title, cpm(), acc(), () => go(() => renderLines(mode, title, makeLines)));
      } else {
        idx++;
        document.getElementById("cPrg").textContent = `${idx + 1}/${lines.length}`;
        document.getElementById("pbar").style.width = (idx / lines.length * 100) + "%";
        paint();
      }
    }
  };
  const t = setInterval(() => {
    if (!start || done) return;
    document.getElementById("cTime").textContent = fmtTime((Date.now() - start) / 1000);
    document.getElementById("cCpm").textContent = cpm();
  }, 250);
  cleanup = () => clearInterval(t);
  paint();
}
function renderLongSelect() {
  app.innerHTML = `${backbar("긴 글 연습")}` + LONG_TEXTS.map((t, i) =>
    `<button class="card menu-card" data-i="${i}">
      <div class="mode-icon" style="background:${grad(MODES.long.g)}">📖</div>
      <div><div class="mt">${t.title}</div><div class="ms">${t.author} · ${t.lines.length}줄 · ${esc(t.lines[0])}</div></div>
    </button>`).join("");
  bindBack();
  app.querySelectorAll("[data-i]").forEach(b => b.addEventListener("click", () => {
    const t = LONG_TEXTS[+b.dataset.i];
    go(() => renderLines("long", t.title, () => t.lines));
  }));
}

/* ── 베네치아 ────────────────────────────────────────────── */
function renderVenice() {
  let words = [], input = "", score = 0, caught = 0, missed = 0, lives = 5, level = 1;
  let running = false, done = false, lastT = 0, spawnIn = 0.5, raf = null;
  app.innerHTML = `
    ${backbar("베네치아")}
    ${chipsHTML([["점수", 0, "cScore"], ["단계", 1, "cLevel"], ["남은 기회", 5, "cLives"], ["성공률", "100%", "cAcc"]])}
    <div class="venice-field card" id="field" style="padding:0">
      <div class="water" id="water" style="height:4%"></div>
      <div class="v-start" id="vstart">
        <div style="font-size:44px">🌊</div>
        <div style="font-weight:800;font-size:19px">낱말이 물에 닿기 전에 입력하세요!</div>
        <div style="color:var(--sub);font-size:14px">놓칠 때마다 물이 차오르고, 5번 놓치면 끝납니다</div>
        <button class="btn" id="vgo">게임 시작</button>
      </div>
    </div>
    ${inputLineHTML("낱말을 입력하고 return")}
    ${keyboardHTML(true)}`;
  bindBack(); bindKeyboard();
  const field = document.getElementById("field");
  const waterRatio = () => 0.45 * (5 - lives) / 5 + 0.04;
  const accPct = () => (caught + missed) ? Math.round(caught / (caught + missed) * 100) : 100;
  const refreshChips = () => {
    document.getElementById("cScore").textContent = score;
    document.getElementById("cLevel").textContent = level;
    document.getElementById("cLives").textContent = lives;
    document.getElementById("cAcc").textContent = accPct() + "%";
    document.getElementById("water").style.height = (waterRatio() * 100) + "%";
  };
  const spawn = () => {
    const el = document.createElement("div");
    el.className = "venice-word";
    el.textContent = WORDS[Math.floor(Math.random() * WORDS.length)];
    field.appendChild(el);
    words.push({ el, x: 0.14 + Math.random() * 0.72, y: 0.04, speed: 1 / (Math.max(4, 10 - level) * (0.85 + Math.random() * 0.3)) });
  };
  const paintWords = () => {
    const w = field.clientWidth, h = field.clientHeight;
    for (const o of words) {
      o.el.style.left = (o.x * w) + "px";
      o.el.style.top = (o.y * h) + "px";
      o.el.classList.toggle("match", !!input && o.el.textContent.startsWith(input));
    }
  };
  const tick = ts => {
    if (!running) return;
    const dt = Math.min((ts - lastT) / 1000 || 0, 0.1);
    lastT = ts;
    for (const o of words) o.y += o.speed * dt;
    const surface = 1 - waterRatio();
    const fallen = words.filter(o => o.y >= surface);
    if (fallen.length) {
      fallen.forEach(o => o.el.remove());
      words = words.filter(o => o.y < surface);
      missed += fallen.length;
      lives = Math.max(0, lives - fallen.length);
      Sound.splash();
      refreshChips();
      if (lives <= 0) { endGame(); return; }
    }
    spawnIn -= dt;
    if (spawnIn <= 0) { spawn(); spawnIn = Math.max(1.1, 2.8 - level * 0.25); }
    paintWords();
    raf = requestAnimationFrame(tick);
  };
  const endGame = () => {
    running = false; done = true;
    if (raf) cancelAnimationFrame(raf);
    Sound.over();
    showResult("venice", `베네치아 · ${level}단계 · ${caught}개 처리`, score, accPct(), () => go(renderVenice));
  };
  document.getElementById("vgo").addEventListener("click", () => {
    document.getElementById("vstart").remove();
    running = true; lastT = 0;
    raf = requestAnimationFrame(ts => { lastT = ts; raf = requestAnimationFrame(tick); });
  });
  const feed = fn => { if (done) return; fn(); setInput(input); paintWords(); };
  session = {
    jamo: j => feed(() => input = hAppend(input, j)),
    space: () => feed(() => input += " "),
    backspace: () => feed(() => input = hDelete(input)),
    submit: () => {
      if (done || !input.trim() || !running) { input = ""; setInput(""); return; }
      const answer = input.trim();
      let best = -1;
      words.forEach((o, i) => { if (o.el.textContent === answer && (best < 0 || o.y > words[best].y)) best = i; });
      if (best >= 0) {
        words[best].el.remove(); words.splice(best, 1);
        caught++; score += keystrokes(answer) * 10;
        Sound.pop();
        if (caught % 10 === 0) { level++; Sound.levelUp(); }
      } else {
        Sound.wrong();
      }
      input = ""; setInput(""); refreshChips(); paintWords();
    }
  };
  cleanup = () => { if (raf) cancelAnimationFrame(raf); running = false; };
}

/* ── 통계 ────────────────────────────────────────────────── */
function renderStats() {
  const user = Users.current();
  const all = Records.mine();
  const nonVenice = all.filter(r => r.m !== "venice");
  const recent = nonVenice.slice(-20);
  const sparkline = () => {
    if (recent.length < 2) return `<div class="note" style="padding:24px 0">연습을 2회 이상 하면 추이가 표시됩니다 📈</div>`;
    const max = Math.max(...recent.map(r => r.c), 1);
    const pts = recent.map((r, i) => `${(i / (recent.length - 1) * 100).toFixed(1)},${(88 - r.c / max * 80).toFixed(1)}`).join(" ");
    return `<svg class="spark" viewBox="0 0 100 92" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="var(--brandA)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  };
  const avg = arr => arr.length ? Math.round(arr.reduce((s, r) => s + r.c, 0) / arr.length) : 0;
  app.innerHTML = `
    ${backbar("통계")}
    <div class="user-hero">
      <div class="ue">${user.emoji}</div>
      <div>
        <div style="font-size:20px;font-weight:800">${esc(user.name)}</div>
        <div style="opacity:.85;font-size:14px">총 ${all.length}회 연습</div>
      </div>
    </div>
    ${chipsHTML([
      ["최고 타수", Math.max(0, ...nonVenice.map(r => r.c)), "s1"],
      ["평균 타수", avg(nonVenice), "s2"],
      ["평균 정확도", (nonVenice.length ? Math.round(nonVenice.reduce((s, r) => s + r.a, 0) / nonVenice.length) : 0) + "%", "s3"],
      ["연습 횟수", all.length, "s4"]
    ])}
    <div class="card"><div class="section-title">📈 타수 추이 (최근 ${recent.length}회)</div>${sparkline()}</div>
    <div class="card"><div class="section-title">모드별 분석</div>
      ${Object.entries(MODES).map(([k, m]) => {
        const rs = Records.of(k);
        const best = rs.length ? Math.max(...rs.map(r => r.c)) : 0;
        return `<div class="stat-row">
          <div class="mi" style="background:${grad(m.g)}">${m.icon}</div>
          <div><div class="sn">${m.title}</div><div class="sd">${rs.length}회 연습</div></div>
          <div class="sv" style="color:${m.g[0]}">${rs.length ? best + m.unit : "기록 없음"}</div>
        </div>`;
      }).join("")}
    </div>
    <div class="card"><div class="section-title">최근 기록</div>
      ${all.length ? all.slice(-10).reverse().map(r => {
        const m = MODES[r.m], d = new Date(r.d);
        return `<div class="stat-row">
          <div class="mi" style="background:${grad(m.g)}">${m.icon}</div>
          <div><div class="sn">${m.title}</div><div class="sd">${d.getMonth() + 1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}</div></div>
          <div class="sv">${r.c}${m.unit} · <span style="color:${r.a >= 90 ? "var(--ok)" : "var(--warn)"}">${r.a}%</span></div>
        </div>`;
      }).join("") : `<div class="note" style="padding:16px 0">아직 연습 기록이 없어요. 연습을 시작해 보세요!</div>`}
    </div>`;
  bindBack();
}

renderMenu();
